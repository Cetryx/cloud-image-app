trigger: none

pool:
  name: "cloud-image-agent-pool"

variables:
  terraformDirectory: "terraform"
  azureSubscriptionId: "<AZURE_SUBSCRIPTION_ID>"
  azureTenantId: "<AZURE_TENANT_ID>"

steps:
  - checkout: self

  - task: PowerShell@2
    displayName: "Terraform init"
    inputs:
      targetType: "inline"
      script: |
        $env:ARM_CLIENT_ID = "$(ARM_CLIENT_ID)"
        $env:ARM_CLIENT_SECRET = "$(ARM_CLIENT_SECRET)"
        $env:ARM_TENANT_ID = "$(azureTenantId)"
        $env:ARM_SUBSCRIPTION_ID = "$(azureSubscriptionId)"
        $env:TF_VAR_subscription_id = "$(azureSubscriptionId)"
        $env:TF_VAR_tenant_id = "$(azureTenantId)"
        cd "$(Build.SourcesDirectory)\$(terraformDirectory)"
        terraform init

  - task: PowerShell@2
    displayName: "Terraform validate"
    inputs:
      targetType: "inline"
      script: |
        $env:ARM_CLIENT_ID = "$(ARM_CLIENT_ID)"
        $env:ARM_CLIENT_SECRET = "$(ARM_CLIENT_SECRET)"
        $env:ARM_TENANT_ID = "$(azureTenantId)"
        $env:ARM_SUBSCRIPTION_ID = "$(azureSubscriptionId)"
        $env:TF_VAR_subscription_id = "$(azureSubscriptionId)"
        $env:TF_VAR_tenant_id = "$(azureTenantId)"
        cd "$(Build.SourcesDirectory)\$(terraformDirectory)"
        terraform fmt -check
        terraform validate

  - task: PowerShell@2
    displayName: "Terraform plan"
    inputs:
      targetType: "inline"
      script: |
        $env:ARM_CLIENT_ID = "$(ARM_CLIENT_ID)"
        $env:ARM_CLIENT_SECRET = "$(ARM_CLIENT_SECRET)"
        $env:ARM_TENANT_ID = "$(azureTenantId)"
        $env:ARM_SUBSCRIPTION_ID = "$(azureSubscriptionId)"
        $env:TF_VAR_subscription_id = "$(azureSubscriptionId)"
        $env:TF_VAR_tenant_id = "$(azureTenantId)"
        cd "$(Build.SourcesDirectory)\$(terraformDirectory)"
        terraform plan

  # Run apply manually only when infrastructure changes should be deployed.
  - task: PowerShell@2
    displayName: "Terraform apply"
    condition: and(succeeded(), eq(variables['RUN_TERRAFORM_APPLY'], 'true'))
    inputs:
      targetType: "inline"
      script: |
        $env:ARM_CLIENT_ID = "$(ARM_CLIENT_ID)"
        $env:ARM_CLIENT_SECRET = "$(ARM_CLIENT_SECRET)"
        $env:ARM_TENANT_ID = "$(azureTenantId)"
        $env:ARM_SUBSCRIPTION_ID = "$(azureSubscriptionId)"
        $env:TF_VAR_subscription_id = "$(azureSubscriptionId)"
        $env:TF_VAR_tenant_id = "$(azureTenantId)"
        cd "$(Build.SourcesDirectory)\$(terraformDirectory)"
        terraform apply -auto-approve
