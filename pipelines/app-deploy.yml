trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/*
      - app/**
      - scripts/deploy-app.ps1
      - pipelines/app-deploy.yml

pool:
  name: "cloud-image-agent-pool"

variables:
  resourceGroupName: "rg-cloud-image-app-tf"
  webAppName: "app-cloud-img-tf-u94m0d"
  pythonExe: "C:\\Program Files\\Python311\\python.exe"
  azureServiceConnection: "sc-cloud-image-app"

steps:
  - checkout: self

  - task: PowerShell@2
    displayName: "Check Python installation"
    inputs:
      targetType: "inline"
      script: |
        & "$(pythonExe)" --version
        & "$(pythonExe)" -m pip --version

  - task: PowerShell@2
    displayName: "Install app dependencies"
    inputs:
      targetType: "inline"
      script: |
        & "$(pythonExe)" -m pip install --upgrade pip
        & "$(pythonExe)" -m pip install -r "$(Build.SourcesDirectory)\app\requirements.txt"

  - task: PowerShell@2
    displayName: "Validate Python code"
    inputs:
      targetType: "inline"
      script: |
        & "$(pythonExe)" -m py_compile "$(Build.SourcesDirectory)\app\app.py"

  - task: AzureCLI@2
    displayName: "Deploy app to Azure App Service"
    inputs:
      azureSubscription: "$(azureServiceConnection)"
      scriptType: "ps"
      scriptLocation: "inlineScript"
      inlineScript: |
        cd "$(Build.SourcesDirectory)"
        .\scripts\deploy-app.ps1 -ResourceGroupName "$(resourceGroupName)" -WebAppName "$(webAppName)"
